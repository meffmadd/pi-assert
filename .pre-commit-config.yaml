repos:
  - repo: local
    hooks:
      - id: typecheck
        name: typecheck (tsc --noEmit)
        entry: npm run typecheck
        language: system
        files: \.(ts|tsx|js|jsx)$
        pass_filenames: false
      - id: lint
        name: lint (eslint .)
        entry: npm run lint
        language: system
        files: \.(ts|tsx|js|jsx)$
        pass_filenames: false
